version: 2

updates:
  # Rust crate dependencies. Patch/minor bumps are grouped into a single weekly
  # PR to keep noise low; major bumps come as individual PRs so they get
  # reviewed on their own (this project vets dependencies deliberately).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used by CI up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        update-types:
          - minor
          - patch
